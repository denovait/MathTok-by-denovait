<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathTok</title>
    <link rel="icon" type="image/png" href="icon.png" sizes="192x192">
    <link rel="icon" type="image/png" href="icon.png" sizes="512x512">

    <link rel="apple-touch-icon" href="icon.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MathTok">

    <style>
        /* ─── CSS Variables (theme system) ─────────────────────────── */
        :root {
            --accent:      #fe2c55;
            --accent2:     #25f4ee;
            --accent-rgb:  254, 44, 85;
            --accent2-rgb: 37, 244, 238;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0d0d0d;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ─── Top Bar ───────────────────────────────────────────────── */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            z-index: 10;
            display: flex;
            gap: 10px;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.92) 0%, transparent 100%);
        }

        .search-bar {
            flex: 1;
            padding: 11px 18px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.11);
            border-radius: 25px;
            color: white;
            font-size: 15px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-bar::placeholder { color: rgba(255,255,255,0.35); }
        .search-bar:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.18);
        }

        .lang-select {
            padding: 9px 11px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.11);
            border-radius: 18px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        /* ─── Toast ─────────────────────────────────────────────────── */
        .toast-notification {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-16px);
            background: rgba(var(--accent-rgb), 0.93);
            color: #fff;
            padding: 11px 22px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            box-shadow: 0 6px 28px rgba(var(--accent-rgb), 0.45);
            text-align: center;
            width: 85%;
            max-width: 340px;
            backdrop-filter: blur(10px);
        }
        .toast-notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ─── Main Content ───────────────────────────────────────────── */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
            padding: 90px 20px 10px 20px;
            cursor: ns-resize;
            background: transparent;
        }

        .topic-badge {
            position: absolute;
            top: 85px;
            background: var(--accent);
            box-shadow: 0 4px 22px rgba(var(--accent-rgb), 0.5);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            z-index: 2;
            text-align: center;
            max-width: 58%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .counter-badge {
            position: absolute;
            top: 85px;
            right: 20px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.09);
            padding: 6px 11px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
        }

        .math-expression {
            font-size: clamp(18px, 3.5vh, 28px);
            font-weight: 700;
            margin-bottom: 28px;
            text-align: center;
            padding: 0 10px;
            line-height: 1.45;
            word-wrap: break-word;
            letter-spacing: -0.2px;
        }

        /* ─── Input Area ─────────────────────────────────────────────── */
        .input-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 350px;
            gap: 13px;
        }

        .answer-input {
            width: 100%;
            padding: 13px;
            border-radius: 14px;
            border: 2px solid rgba(255,255,255,0.07);
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .answer-input.active-input {
            border-color: var(--accent2);
            box-shadow: 0 0 0 3px rgba(var(--accent2-rgb), 0.14);
        }

        .controls-row {
            display: flex;
            width: 100%;
            gap: 7px;
            z-index: 5;
        }

        .secondary-btn {
            background: rgba(255,255,255,0.05);
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.09);
            padding: 11px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            flex: 1;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: background 0.15s, transform 0.1s;
        }
        .secondary-btn:active {
            background: rgba(255,255,255,0.11);
            transform: scale(0.97);
        }

        .btn-help {
            color: var(--accent2);
            border-color: rgba(var(--accent2-rgb), 0.22);
        }
        .btn-settings {
            color: rgba(255,255,255,0.5);
        }

        .action-btn {
            flex: 1.3;
            padding: 11px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(var(--accent-rgb), 0.38);
            transition: opacity 0.15s, transform 0.1s;
            letter-spacing: 0.2px;
        }
        .action-btn:active {
            opacity: 0.82;
            transform: scale(0.97);
        }

        /* ─── Explanation Box ─────────────────────────────────────────── */
        .explanation-box {
            display: none;
            margin-top: 3px;
            padding: 13px 14px;
            border-left: 4px solid var(--accent);
            background: rgba(var(--accent-rgb), 0.09);
            border-radius: 10px;
            font-size: 14px;
            width: 100%;
            line-height: 1.55;
            max-height: 130px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .explanation-box.is-correct {
            background: rgba(var(--accent2-rgb), 0.09);
            border-left-color: var(--accent2);
        }
        .explanation-box.is-wrong {
            background: rgba(var(--accent-rgb), 0.09);
            border-left-color: var(--accent);
        }

        /* ─── Modal Base ─────────────────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            z-index: 500;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .app-modal {
            background: rgba(16,16,16,0.97);
            border-radius: 22px;
            width: 100%;
            max-width: 420px;
            padding: 22px;
            border: 1px solid rgba(255,255,255,0.07);
            box-shadow: 0 30px 70px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
        }
        .modal-help    { border-color: rgba(var(--accent2-rgb), 0.22); }
        .modal-settings {
            border-color: rgba(255,255,255,0.08);
            max-height: 88vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.2px;
        }
        .title-help     { color: var(--accent2); }
        .title-settings { color: #fff; }

        .modal-body {
            font-size: 15px;
            line-height: 1.6;
            color: #ccc;
            white-space: pre-line;
        }

        .close-modal-btn {
            margin-top: 18px;
            width: 100%;
            padding: 13px;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 11px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .close-modal-btn:active { background: rgba(255,255,255,0.1); }

        /* ─── Settings: Section Labels ───────────────────────────────── */
        .section-label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.32);
            margin-bottom: 12px;
            margin-top: 22px;
        }
        .section-label:first-child { margin-top: 0; }

        /* ─── Settings: Theme Swatches ───────────────────────────────── */
        .theme-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }

        .theme-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .theme-card:active { transform: scale(0.88); }

        .theme-swatch {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            border: 2.5px solid rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .theme-swatch.is-active {
            border-color: #fff;
            box-shadow: 0 0 0 2.5px rgba(255,255,255,0.28), 0 4px 14px rgba(0,0,0,0.4);
        }
        .swatch-fill {
            position: absolute;
            inset: 0;
        }
        /* Diagonal line divider on swatch */
        .swatch-fill::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, transparent 49.5%, rgba(0,0,0,0.12) 49.5%, rgba(0,0,0,0.12) 50.5%, transparent 50.5%);
        }

        .theme-label {
            font-size: 10px;
            font-weight: 700;
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.4px;
        }
        .theme-card.is-active .theme-label { color: rgba(255,255,255,0.88); }

        /* ─── Settings: Wallpaper Cards ──────────────────────────────── */
        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .wp-card {
            height: 75px;
            border-radius: 13px;
            cursor: pointer;
            border: 2.5px solid rgba(255,255,255,0.06);
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
        }
        .wp-card:active { transform: scale(0.91); }
        .wp-card.is-active {
            border-color: #fff;
            box-shadow: 0 0 0 2.5px rgba(255,255,255,0.22);
        }

        .wp-bg {
            position: absolute;
            inset: 0;
        }

        .wp-check {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -55%);
            font-size: 22px;
            display: none;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.9));
        }
        .wp-card.is-active .wp-check { display: block; }

        .wp-label {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            color: rgba(255,255,255,0.88);
            text-shadow: 0 1px 5px rgba(0,0,0,1);
            padding: 4px 0 5px;
            background: linear-gradient(transparent, rgba(0,0,0,0.55));
            letter-spacing: 0.4px;
        }

        /* ─── Math Keyboard ──────────────────────────────────────────── */
        .math-keyboard {
            width: 100%;
            background: rgba(10,10,10,0.98);
            border-top: 1px solid rgba(255,255,255,0.04);
            padding: 7px 7px max(10px, env(safe-area-inset-bottom)) 7px;
            display: none;
            flex-direction: column;
            gap: 5px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .math-keyboard.show { display: flex; }
        .keyboard-row { display: flex; width: 100%; gap: 5px; }

        .key {
            background: rgba(46,46,46,0.9);
            color: white;
            border: 1px solid rgba(255,255,255,0.04);
            flex: 1;
            height: clamp(38px, 5vh, 46px);
            font-size: 18px;
            font-weight: 600;
            border-radius: 9px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s, transform 0.08s;
        }
        .key:active { background: rgba(72,72,72,0.9); transform: scale(0.94); }
        .key-action  { background: rgba(58,58,58,0.9); }
        .key-accent  { background: var(--accent); border-color: transparent; }
        .key-submit  { background: var(--accent2); color: #000; font-weight: 800; border-color: transparent; }
    </style>

    <style id="wallpaperStyle"></style>
</head>
<body>

    <div class="top-bar">
        <select class="lang-select" id="langSelect">
            <option value="de">DE</option>
            <option value="ua">UA</option>
            <option value="ru">RU</option>
            <option value="en">EN</option>
        </select>
        <input type="text" class="search-bar" id="searchBar" placeholder="Thema suchen...">
    </div>

    <div class="toast-notification" id="toastNotif">Generierung...</div>

    <div class="main-content" id="mainContent">
        <div class="topic-badge" id="cardBadge">MathTok</div>
        <div class="counter-badge" id="cardCounter">0 / 0</div>
        <div class="math-expression" id="cardQuestion">Gib ein Thema ein, um Karten zu erhalten</div>

        <div class="input-area">
            <input type="text" class="answer-input" id="answerInput" placeholder="..." readonly>

            <div class="controls-row">
                <button class="secondary-btn btn-help"     id="openHelpBtn">💡 <span id="btnHelpTxt">Hilfe</span></button>
                <button class="secondary-btn btn-settings" id="openSettingsBtn">🎨 <span id="btnSettingsTxt">Stil</span></button>
                <button class="action-btn" id="checkBtn">Prüfen</button>
            </div>

            <div class="explanation-box" id="explanationBox"></div>
        </div>
    </div>

    <div class="modal-overlay" id="helpModalOverlay">
        <div class="app-modal modal-help">
            <div class="modal-title title-help">💡 Formeln & Hinweise</div>
            <div class="modal-body" id="helpModalBody">Keine Tipps verfügbar.</div>
            <button class="close-modal-btn" id="closeHelpBtn">Schließen</button>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModalOverlay">
        <div class="app-modal modal-settings">
            <div class="modal-title title-settings">🎨 Einstellungen</div>

            <div class="section-label">Farbthema</div>
            <div class="theme-grid" id="themeGrid"></div>

            <div class="section-label">Hintergrund</div>
            <div class="wallpaper-grid" id="wallpaperGrid"></div>

            <button class="close-modal-btn" id="closeSettingsBtn" style="margin-top:22px;">Fertig ✓</button>
        </div>
    </div>

    <div class="math-keyboard" id="mathKeyboard">
        <div class="keyboard-row">
            <button class="key key-action">n</button>
            <button class="key key-action">x</button>
            <button class="key key-action">y</button>
            <button class="key key-accent" id="keyDelete">⌫</button>
        </div>
        <div class="keyboard-row">
            <button class="key">7</button><button class="key">8</button><button class="key">9</button><button class="key key-action">/</button>
        </div>
        <div class="keyboard-row">
            <button class="key">4</button><button class="key">5</button><button class="key">6</button><button class="key key-action">*</button>
        </div>
        <div class="keyboard-row">
            <button class="key">1</button><button class="key">2</button><button class="key">3</button><button class="key key-action">-</button>
        </div>
        <div class="keyboard-row">
            <button class="key">0</button><button class="key">.</button><button class="key key-action">+</button><button class="key key-submit" id="keyHide">⬇</button>
        </div>
    </div>

    <script>
        // ================================================================
        // CONFIG & API FETCH
        // ================================================================
        let currentLang         = 'de';
        let debounceTimer       = null;
        let isScrollThrottled   = false;
        let cardsPack           = [];
        let currentCardIndex    = 0;
        let activeThemeId       = 'tiktok';
        let activeWallpaperId   = 'void';

        async function fetchProblemsFromGroq(topicPrompt) {
            const systemPrompt = `You are a strict JSON generator. Respond ONLY with valid JSON. Do not wrap in markdown quotes.
Language for all content: "${currentLang}".
Task: Generate exactly 10 math exercises for: "${topicPrompt}".
Structure:
{
  "exercises": [
    {
      "topic": "Short Topic",
      "question": "Math expression",
      "answer": "short solution",
      "explain": "1 sentence explanation",
      "help": "formula"
    }
  ]
}`;

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: systemPrompt },
                            { role: "user",   content: `Generate JSON object with 10 exercises for: ${topicPrompt}` }
                        ],
                        temperature: 0.2,
                        response_format: { type: "json_object" }
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                let raw = data.choices[0].message.content.trim();
                const m = raw.match(/\{[\s\S]*\}/);
                if (m) raw = m[0];
                const parsed = JSON.parse(raw);
                return parsed.exercises || parsed;
                
            } catch (e) {
                console.error("Error:", e);
                return [{
                    topic: "FEHLER",
                    question: "Verbindung zum Server fehlgeschlagen.",
                    answer: "0",
                    explain: "Versuche es позже erneut.",
                    help: "Server-Fehler."
                }];
            }
        }

        // ================================================================
        // DOM REFS
        // ================================================================
        const searchBar           = document.getElementById('searchBar');
        const keyboard            = document.getElementById('mathKeyboard');
        const langSelect          = document.getElementById('langSelect');
        const toast               = document.getElementById('toastNotif');
        const cardBadge           = document.getElementById('cardBadge');
        const cardCounter         = document.getElementById('cardCounter');
        const cardQuestion        = document.getElementById('cardQuestion');
        const answerInput         = document.getElementById('answerInput');
        const checkBtn            = document.getElementById('checkBtn');
        const explanationBox      = document.getElementById('explanationBox');
        const helpModalOverlay    = document.getElementById('helpModalOverlay');
        const helpModalBody       = document.getElementById('helpModalBody');
        const settingsModalOverlay = document.getElementById('settingsModalOverlay');
        const wallpaperStyle      = document.getElementById('wallpaperStyle');

        // ================================================================
        // THEME DATA
        // ================================================================
        const themes = [
            { id: 'tiktok',  name: 'TikTok',  accent: '#fe2c55', accent2: '#25f4ee', aRGB: '254,44,85',  a2RGB: '37,244,238',  swatch: 'linear-gradient(135deg,#fe2c55 0%,#25f4ee 100%)' },
            { id: 'neon',    name: 'Neon',    accent: '#bf5af2', accent2: '#ff375f', aRGB: '191,90,242', a2RGB: '255,55,95',   swatch: 'linear-gradient(135deg,#bf5af2 0%,#ff375f 100%)' },
            { id: 'ocean',   name: 'Ocean',   accent: '#0a84ff', accent2: '#30d158', aRGB: '10,132,255', a2RGB: '48,209,88',   swatch: 'linear-gradient(135deg,#0a84ff 0%,#30d158 100%)' },
            { id: 'sunset',  name: 'Sunset',  accent: '#ff9f0a', accent2: '#ff375f', aRGB: '255,159,10', a2RGB: '255,55,95',   swatch: 'linear-gradient(135deg,#ff9f0a 0%,#ff375f 100%)' },
            { id: 'matrix',  name: 'Matrix',  accent: '#32d74b', accent2: '#00ff88', aRGB: '50,215,75',  a2RGB: '0,255,136',   swatch: 'linear-gradient(135deg,#32d74b 0%,#00ff88 100%)' },
            { id: 'gold',    name: 'Gold',    accent: '#ffd60a', accent2: '#ff9f0a', aRGB: '255,214,10', a2RGB: '255,159,10',  swatch: 'linear-gradient(135deg,#ffd60a 0%,#ff9f0a 100%)' },
        ];

        // ================================================================
        // WALLPAPER DATA
        // ================================================================
        const wallpapers = [
            { id: 'void', name: 'Void', css: 'body { background: #0a0a0a !important; }', preview: 'background:#0a0a0a;' },
            { id: 'cosmos', name: 'Cosmos', css: 'body { background: radial-gradient(ellipse at 28% 18%, #30084a 0%, #08080f 65%) !important; }', preview: 'background:radial-gradient(ellipse at 28% 18%,#30084a,#08080f);' },
            { id: 'aurora', name: 'Aurora', css: 'body { background: radial-gradient(ellipse at 50% 95%, #0b3028 0%, #081522 65%) !important; }', preview: 'background:radial-gradient(ellipse at 50% 95%,#0b3028,#081522);' },
            { id: 'sunset', name: 'Sunset', css: 'body { background: radial-gradient(ellipse at 50% 95%, #321008 0%, #19071e 65%) !important; }', preview: 'background:radial-gradient(ellipse at 50% 95%,#321008,#19071e);' },
            { id: 'ocean', name: 'Ocean', css: 'body { background: radial-gradient(ellipse at 50% 95%, #001d38 0%, #07091e 65%) !important; }', preview: 'background:radial-gradient(ellipse at 50% 95%,#001d38,#07091e);' },
            { id: 'grid', name: 'Grid', css: 'body { background-color: #0c0c0c !important; background-image: linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.028) 1px, transparent 1px) !important; background-size: 26px 26px !important; }', preview: 'background-color:#0c0c0c;background-image:linear-gradient(rgba(255,255,255,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.07) 1px,transparent 1px);background-size:8px 8px;' },
        ];

        // ================================================================
        // THEME & WALLPAPER APPLICATION
        // ================================================================
        function applyTheme(id) {
            const t = themes.find(x => x.id === id);
            if (!t) return;
            activeThemeId = id;
            const root = document.documentElement;
            root.style.setProperty('--accent',      t.accent);
            root.style.setProperty('--accent2',     t.accent2);
            root.style.setProperty('--accent-rgb',  t.aRGB);
            root.style.setProperty('--accent2-rgb', t.a2RGB);

            document.querySelectorAll('.theme-card').forEach(c => {
                const active = c.dataset.id === id;
                c.classList.toggle('is-active', active);
                c.querySelector('.theme-swatch').classList.toggle('is-active', active);
            });
        }

        function applyWallpaper(id) {
            const w = wallpapers.find(x => x.id === id);
            if (!w) return;
            activeWallpaperId = id;
            wallpaperStyle.textContent = w.css;
            document.querySelectorAll('.wp-card').forEach(c => c.classList.toggle('is-active', c.dataset.id === id));
        }

        function buildSettingsUI() {
            const themeGrid = document.getElementById('themeGrid');
            themeGrid.innerHTML = '';
            themes.forEach(t => {
                const card = document.createElement('div');
                card.className = 'theme-card' + (t.id === activeThemeId ? ' is-active' : '');
                card.dataset.id = t.id;
                card.innerHTML = `
                    <div class="theme-swatch${t.id === activeThemeId ? ' is-active' : ''}">
                        <div class="swatch-fill" style="background:${t.swatch};"></div>
                    </div>
                    <span class="theme-label">${t.name}</span>
                `;
                card.addEventListener('click', () => applyTheme(t.id));
                themeGrid.appendChild(card);
            });

            const wpGrid = document.getElementById('wallpaperGrid');
            wpGrid.innerHTML = '';
            wallpapers.forEach(w => {
                const card = document.createElement('div');
                card.className = 'wp-card' + (w.id === activeWallpaperId ? ' is-active' : '');
                card.dataset.id = w.id;
                card.innerHTML = `
                    <div class="wp-bg" style="${w.preview}"></div>
                    <span class="wp-check">✓</span>
                    <span class="wp-label">${w.name}</span>
                `;
                card.addEventListener('click', () => applyWallpaper(w.id));
                wpGrid.appendChild(card);
            });
        }

        // ================================================================
        // LOCALES (Расширенный перевод)
        // ================================================================
        const uiLocales = {
            de: { 
                checkBtn: "Prüfen", correct: "🎉 Richtig!", wrong: "❌ Falsch.", 
                placeholder: "Thema suchen...", loading: "⚡ Aufgaben werden erstellt...", 
                settingsBtn: "Stil", helpBtn: "Hilfe", closeBtn: "Schließen",
                helpTitle: "💡 Formeln & Hinweise", settingsTitle: "🎨 Einstellungen",
                themeLabel: "Farbthema", bgLabel: "Hintergrund", doneBtn: "Fertig ✓",
                noTips: "Keine Tipps verfügbar.", defQuestion: "Gib ein Thema ein, um Karten zu erhalten"
            },
            ua: { 
                checkBtn: "Перевірити", correct: "🎉 Правильно!", wrong: "❌ Помилка.", 
                placeholder: "Шукати тему...", loading: "⚡ ШІ генерує задачі...", 
                settingsBtn: "Стиль", helpBtn: "Підказка", closeBtn: "Закрити",
                helpTitle: "💡 Формули та підказки", settingsTitle: "🎨 Налаштування",
                themeLabel: "Колірна тема", bgLabel: "Задній фон", doneBtn: "Готово ✓",
                noTips: "Підказок немає.", defQuestion: "Введіть тему, щоб отримати картки"
            },
            ru: { 
                checkBtn: "Проверить", correct: "🎉 Правильно!", wrong: "❌ Неверно.", 
                placeholder: "Поиск темы...", loading: "⚡ ИИ создает задачи...", 
                settingsBtn: "Стиль", helpBtn: "Помощь", closeBtn: "Закрыть",
                helpTitle: "💡 Формулы и подсказки", settingsTitle: "🎨 Настройки",
                themeLabel: "Цветовая схема", bgLabel: "Задний фон", doneBtn: "Готово ✓",
                noTips: "Подсказок нет.", defQuestion: "Введите тему, чтобы получить карточки"
            },
            en: { 
                checkBtn: "Check", correct: "🎉 Correct!", wrong: "❌ Incorrect.", 
                placeholder: "Search topic...", loading: "⚡ Generating tasks...", 
                settingsBtn: "Style", helpBtn: "Help", closeBtn: "Close",
                helpTitle: "💡 Formulas & Hints", settingsTitle: "🎨 Settings",
                themeLabel: "Color Theme", bgLabel: "Background", doneBtn: "Done ✓",
                noTips: "No tips available.", defQuestion: "Enter a topic to get cards"
            }
        };

        // ================================================================
        // СЛУШАТЕЛЬ СМЕНЫ ЯЗЫКА
        // ================================================================
        langSelect.addEventListener('change', e => {
            currentLang = e.target.value;
            const loc = uiLocales[currentLang];
            
            // Обновляем главную страницу
            searchBar.placeholder = loc.placeholder;
            checkBtn.innerText    = loc.checkBtn;
            document.getElementById('btnSettingsTxt').innerText = loc.settingsBtn;
            document.getElementById('btnHelpTxt').innerText     = loc.helpBtn;
            
            if(cardsPack.length === 0) {
                cardQuestion.innerText = loc.defQuestion;
            }

            // Обновляем окна настроек и помощи (динамически меняем текст в HTML)
            document.querySelector('.title-help').innerText = loc.helpTitle;
            document.querySelector('.title-settings').innerText = loc.settingsTitle;
            document.getElementById('closeHelpBtn').innerText = loc.closeBtn;
            document.getElementById('closeSettingsBtn').innerText = loc.doneBtn;
            
            // Перерисовываем надписи секций в настройках стиля
            const labels = document.querySelectorAll('.section-label');
            if(labels.length >= 2) {
                labels[0].innerText = loc.themeLabel;
                labels[1].innerText = loc.bgLabel;
            }
        });

        // ================================================================
        // CARD RENDERING & PACK LOGIC
        // ================================================================
        function renderCurrentCard() {
            if (cardsPack.length === 0) return;
            const card = cardsPack[currentCardIndex];
            cardBadge.innerText   = card.topic || searchBar.value;
            cardCounter.innerText = `${currentCardIndex + 1} / ${cardsPack.length}`;
            cardQuestion.innerText = card.question;
            explanationBox.style.display = 'none';
            explanationBox.classList.remove('is-correct', 'is-wrong');
            answerInput.value = '';
            keyboard.classList.add('show');
            answerInput.classList.add('active-input');
        }

        async function generatePack(topic) {
            toast.innerText = uiLocales[currentLang].loading;
            toast.classList.add('show');
            const pack = await fetchProblemsFromGroq(topic);
            toast.classList.remove('show');
            if (pack && pack.length > 0) {
                cardsPack = pack;
                currentCardIndex = 0;
                renderCurrentCard();
            }
        }

        function queuePack(val) {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => generatePack(val), 1500);
        }

        // ================================================================
        // EVENTS
        // ================================================================
        searchBar.addEventListener('input', e => {
            const v = e.target.value.trim();
            if (v) queuePack(v);
        });

        searchBar.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const v = searchBar.value.trim();
                if (v) { clearTimeout(debounceTimer); searchBar.blur(); generatePack(v); }
            }
        });

        window.addEventListener('wheel', e => {
            if (cardsPack.length <= 1 || isScrollThrottled) return;
            if (Math.abs(e.deltaY) > 30) {
                isScrollThrottled = true;
                currentCardIndex = e.deltaY > 0
                    ? (currentCardIndex + 1) % cardsPack.length
                    : (currentCardIndex - 1 + cardsPack.length) % cardsPack.length;
                renderCurrentCard();
                setTimeout(() => { isScrollThrottled = false; }, 350);
            }
        });
        // ================================================================
        // SWIPE FOR PHONES (TOUCH EVENTS)
        // ================================================================
        let touchStartY = 0;
        let touchEndY = 0;

        window.addEventListener('touchstart', e => {
            // Игнорируем свайп, если палец на клавиатуре или поле ввода, чтобы не мешать писать
            if (e.target.closest('#mathKeyboard') || e.target.closest('#answerInput') || e.target.closest('.top-bar')) return;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        window.addEventListener('touchend', e => {
            if (e.target.closest('#mathKeyboard') || e.target.closest('#answerInput') || e.target.closest('.top-bar')) return;
            if (cardsPack.length <= 1 || isScrollThrottled) return;

            touchEndY = e.changedTouches[0].screenY;
            const swipeDistance = touchEndY - touchStartY;

            // Если свайпнули достаточно сильно (больше 50 пикселей)
            if (Math.abs(swipeDistance) > 50) {
                isScrollThrottled = true;
                
                if (swipeDistance < 0) {
                    // Свайп вверх -> следующая карточка
                    currentCardIndex = (currentCardIndex + 1) % cardsPack.length;
                } else {
                    // Свайп вниз -> предыдущая карточка
                    currentCardIndex = (currentCardIndex - 1 + cardsPack.length) % cardsPack.length;
                }
                
                renderCurrentCard();
                
                setTimeout(() => { isScrollThrottled = false; }, 350);
            }
        }, { passive: true });

        checkBtn.addEventListener('click', () => {
            if (!cardsPack.length) return;
            const card = cardsPack[currentCardIndex];
            const loc  = uiLocales[currentLang];
            if (!card.answer) return;

            explanationBox.classList.remove('is-correct', 'is-wrong');

            if (answerInput.value.trim().toLowerCase() === card.answer.toLowerCase()) {
                explanationBox.classList.add('is-correct');
                explanationBox.innerHTML = `${loc.correct}<br><br>${card.explain}`;
            } else {
                explanationBox.classList.add('is-wrong');
                explanationBox.innerHTML = `${loc.wrong}<br><br><b>Lösung:</b> ${card.answer}<br>${card.explain}`;
            }
            explanationBox.style.display = 'block';
        });

        document.getElementById('openHelpBtn').addEventListener('click', () => {
            helpModalBody.innerText = cardsPack.length ? (cardsPack[currentCardIndex].help || "Keine Tipps.") : "Keine Tipps.";
            helpModalOverlay.classList.add('active');
        });
        document.getElementById('closeHelpBtn').addEventListener('click', () => helpModalOverlay.classList.remove('active'));

        document.getElementById('openSettingsBtn').addEventListener('click', () => {
            buildSettingsUI();
            settingsModalOverlay.classList.add('active');
        });
        document.getElementById('closeSettingsBtn').addEventListener('click', () => settingsModalOverlay.classList.remove('active'));

        answerInput.addEventListener('click', () => {
            keyboard.classList.add('show');
            answerInput.classList.add('active-input');
        });

        keyboard.addEventListener('click', e => {
            if (!e.target.classList.contains('key')) return;
            if      (e.target.id === 'keyDelete') answerInput.value = answerInput.value.slice(0, -1);
            else if (e.target.id === 'keyHide')   { keyboard.classList.remove('show'); answerInput.classList.remove('active-input'); }
            else                                   answerInput.value += e.target.innerText;
        });

        langSelect.addEventListener('change', e => {
            currentLang = e.target.value;
            const loc = uiLocales[currentLang];
            searchBar.placeholder = loc.placeholder;
            checkBtn.innerText    = loc.checkBtn;
            document.getElementById('btnSettingsTxt').innerText = loc.settingsBtn;
        });

        // ================================================================
        // INIT
        // ================================================================
        searchBar.placeholder = uiLocales[currentLang].placeholder;
        applyTheme('tiktok');
        applyWallpaper('void');
    </script>
</body>
</html>
